; IOP + u8g2 SPI SSD1306 demo — u8g2 as an alternate Transport (see oneIO/display/u8g2Spi.h).
; Uses u8g2_Setup_ssd1306_128x64_noname_1: 1-tile (8px-row) buffer, smallest RAM,
; most FirstPage/NextPage redraw passes — the extreme end of the RAM-for-CPU trade
; discussed for tile-buffered displays (AM4 precedent).
;
; Shared hardware SPI: MOSI=D11, SCK=D13. CS=D10, DC=D9, RST=D8.
; Encoder: A=A0(PC0), B=A1(PC1), SW=A2(PC2) — PCINT1.
[platformio]
default_envs = avr

[common]
build_unflags =
    -std=c++11 -std=c++14 -std=c++20 -std=c++2a
    -std=gnu++11 -std=gnu++14 -std=gnu++20 -std=gnu++2a -std=gnu++1z
build_flags = -std=c++17
lib_deps =
    HAPI      = https://github.com/InternetOfPins/HAPI.git
    OneBit    = https://github.com/InternetOfPins/OneBit.git
    OnePin    = https://github.com/InternetOfPins/OnePin.git
    OneBus    = https://github.com/InternetOfPins/OneBus.git
    OneChip   = https://github.com/InternetOfPins/OneChip.git
    OneInput  = https://github.com/InternetOfPins/OneInput.git
    OneData   = https://github.com/InternetOfPins/OneData.git
    OneItem   = https://github.com/InternetOfPins/OneItem.git
    OneOutput = https://github.com/InternetOfPins/OneOutput.git
    OneMenu   = https://github.com/InternetOfPins/OneMenu.git
    OneIO     = https://github.com/InternetOfPins/OneIO.git
    olikraus/U8g2 @ ^2.36.13

[env:avr]
platform = atmelavr@^4.0.0
board = uno
upload_port   = /dev/ttyACM0
monitor_port  = /dev/ttyACM0
monitor_speed = 9600
build_unflags = ${common.build_unflags}
build_flags   = ${common.build_flags} -DIOP
lib_deps      = ${common.lib_deps}
lib_ldf_mode  = off
lib_compat_mode = off
