; IOP HD44780 I2C LCD example — PCF8574 backpack, SDA=A4, SCL=A5.
; Address 0x27 (A0-A2=000); change to 0x3F for PCF8574A variant.
[platformio]
default_envs = avr

[common]
build_unflags =
    -std=c++11 -std=c++14 -std=c++20 -std=c++2a
    -std=gnu++11 -std=gnu++14 -std=gnu++20 -std=gnu++2a -std=gnu++1z
build_flags = -std=c++17
lib_deps =
    HAPI    = symlink://../../../HAPI
    OneBit  = symlink://../../../OneBit
    OnePin  = symlink://../../../OnePin
    OneBus  = symlink://../../../OneBus
    OneChip = symlink://../../../OneChip
    OneIO   = symlink://../../

[env:avr]
platform = atmelavr@^4.0.0
board = uno
upload_port   = /dev/ttyUSB0
monitor_port  = /dev/ttyUSB0
monitor_speed = 9600
build_unflags = ${common.build_unflags}
build_flags   = ${common.build_flags} -DIOP
lib_deps      = ${common.lib_deps}
