; IOP SSD1306 128×64 I2C OLED.
; AVR:   SDA=A4, SCL=A5. Address 0x3C (most modules); try 0x3D if blank.
; ESP32: SDA=21, SCL=22 (default I2C). Same address selection.
[platformio]
default_envs = avr

[common]
build_unflags =
    -std=c++11 -std=c++14 -std=c++20 -std=c++2a
    -std=gnu++11 -std=gnu++14 -std=gnu++20 -std=gnu++2a -std=gnu++1z
build_flags = -std=c++17
lib_deps =
    HAPI    = https://github.com/InternetOfPins/HAPI.git
    OneBit  = https://github.com/InternetOfPins/OneBit.git
    OnePin  = https://github.com/InternetOfPins/OnePin.git
    OneBus  = https://github.com/InternetOfPins/OneBus.git
    OneChip = https://github.com/InternetOfPins/OneChip.git
    OneIO   = https://github.com/InternetOfPins/OneIO.git

[env:avr]
platform = atmelavr@^4.0.0
board = uno
upload_port   = /dev/ttyACM0
monitor_port  = /dev/ttyACM0
monitor_speed = 9600
build_unflags = ${common.build_unflags}
build_flags   = ${common.build_flags} -DIOP
lib_deps      = ${common.lib_deps}

[env:esp32]
platform  = espressif32@5.4.0
board     = esp32dev
framework = arduino
upload_port   = /dev/ttyUSB0
monitor_port  = /dev/ttyUSB0
monitor_speed = 115200
build_unflags = ${common.build_unflags}
; ESP32 Arduino framework uses ##__VA_ARGS__ GNU extension — must use gnu++17, not c++17.
build_flags   = -std=gnu++17
lib_deps      = ${common.lib_deps}

; WEMOS LOLIN32 / LOLIN D32 with built-in SSD1306 OLED.
; On-board OLED is wired to I2C: SDA=GPIO5, SCL=GPIO4.
[env:lolin32]
platform  = espressif32@5.4.0
board     = lolin32
framework = arduino
upload_port   = /dev/ttyUSB0
monitor_port  = /dev/ttyUSB0
monitor_speed = 115200
build_unflags = ${common.build_unflags}
build_flags   = -std=gnu++17 -DLOLIN32_OLED
lib_deps      = ${common.lib_deps}

; Wemos D1 Mini (ESP8266): SDA=GPIO4(D2), SCL=GPIO5(D1).
; Compiles and uploads via CH340 on /dev/ttyUSB0.
[env:d1_mini]
platform  = espressif8266
board     = d1_mini
framework = arduino
upload_port   = /dev/ttyUSB0
monitor_port  = /dev/ttyUSB0
monitor_speed = 115200
build_unflags = ${common.build_unflags}
build_flags   = -std=gnu++17
lib_deps      = ${common.lib_deps}
